server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rideshare}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.open-in-view=false
app.upi.id=9059559943@ybl

# ── Bus-style fare slab (EDIT THESE to match your actual local rates) ──
# Fare per seat = app.fare.min-fare for the first app.fare.min-km km,
# then + app.fare.rate-per-km for every km beyond that.
# Example with the defaults below: 0-5km = ₹15 flat, 8km = 15 + (8-5)*2 = ₹21
app.fare.min-km=5
app.fare.min-fare=15
app.fare.rate-per-km=2.0

# ── Revenue split (must add up to 1.0) ──
app.split.traveller-share=0.70
app.split.app-share=0.30
